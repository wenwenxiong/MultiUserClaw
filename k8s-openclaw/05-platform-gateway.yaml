apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-gateway
  namespace: openclaw-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-gateway
  template:
    metadata:
      labels:
        app: platform-gateway
    spec:
      containers:
      - name: gateway
        image: openclaw-gateway:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: openclaw-config
        - secretRef:
            name: openclaw-secrets
        env:
        - name: PLATFORM_OPENCLAW_IMAGE
          value: "openclaw-user:latest"
        - name: PLATFORM_CONTAINER_DATA_DIR
          value: "/var/lib/openclaw-users"
        - name: PLATFORM_CONTAINER_TIMEOUT_SECONDS
          value: "600"
        - name: USE_K8S_CONTAINER_MANAGER
          value: "false"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1.0"
        volumeMounts:
        - name: containerd-sock
          mountPath: /var/run/docker.sock
        - name: user-data
          mountPath: /var/lib/openclaw-users
      volumes:
      - name: containerd-sock
        hostPath:
          path: /run/k3s/containerd/containerd.sock
          type: Socket
      - name: user-data
        hostPath:
          path: /var/lib/openclaw-users
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: platform-gateway-service
  namespace: openclaw-system
spec:
  selector:
    app: platform-gateway
  ports:
  - port: 8080
    targetPort: 8080
