apiVersion: apps/v1
kind: Deployment
metadata:
  name: shared-openclaw
  namespace: openclaw-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shared-openclaw
  template:
    metadata:
      labels:
        app: shared-openclaw
    spec:
      containers:
      - name: shared-openclaw
        image: openclaw-user:latest
        command: ["node", "bridge/dist/bridge/start.js"]
        ports:
        - containerPort: 18080
        envFrom:
        - configMapRef:
            name: openclaw-config
        env:
        - name: NANOBOT_PROXY__URL
          value: "http://platform-gateway-service.openclaw-system.svc.cluster.local:8080/llm/v1"
        - name: NANOBOT_PROXY__TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: PLATFORM_SHARED_OPENCLAW_SYSTEM_TOKEN
        - name: NANOBOT_AGENTS__DEFAULTS__MODEL
          valueFrom:
            configMapKeyRef:
              name: openclaw-config
              key: PLATFORM_DEFAULT_MODEL
        - name: BRIDGE_ENABLE_CHANNELS
          value: "0"
        resources:
          requests:
            memory: "200Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: shared-data
          mountPath: /root/.openclaw
      volumes:
      - name: shared-data
        hostPath:
          path: /var/lib/openclaw/shared
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: shared-openclaw-service
  namespace: openclaw-system
spec:
  selector:
    app: shared-openclaw
  ports:
  - port: 18080
    targetPort: 18080
